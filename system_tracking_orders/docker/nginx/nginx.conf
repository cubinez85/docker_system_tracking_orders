events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    sendfile on;
    keepalive_timeout 65;
    
    # ✅ Docker DNS resolver (обязательно для dynamic upstream resolution)
    resolver 127.0.0.11 valid=10s ipv6=off;
    
    # Upstream с переменным резолвингом
    upstream django_app {
        server web:8000;
        keepalive 16;
    }
    
    server {
        listen 80;
        server_name tracking-orders.cubinez.ru www.tracking-orders.cubinez.ru;
        
        # Редирект www → основной домен
        if ($host = www.tracking-orders.cubinez.ru) {
            return 301 https://tracking-orders.cubinez.ru$request_uri;
        }
        
        location /static/ {
            alias /app/static/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }
        
        location /media/ {
            alias /app/media/;
            expires 30d;
            access_log off;
        }
        
        location /admin/ {
            auth_basic "Admin Area - Authorization Required";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        location / {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Health check для самого nginx
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
    
    # Catch-all для неизвестных доменов (защита)
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
