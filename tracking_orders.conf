# =============================================================================
# manage-users.cubinez.ru → прокси на Docker-контейнер (порт 8081)
# =============================================================================

server {
    listen 80;
    server_name tracking-orders.cubinez.ru;

    # Логи
    access_log /var/log/nginx/tracking-orders-access.log;
    error_log /var/log/nginx/tracking-orders-error.log;

    # === Все запросы проксируются на Docker-контейнер ===
    location / {
        proxy_pass http://127.0.0.1:8080;

        # Обязательные заголовки для корректной работы Django
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Таймауты для долгих запросов
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;

        # Поддержка WebSocket (если понадобится)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # === Опционально: кэширование статики ===
    location /static/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Кэширование статики на клиенте
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
